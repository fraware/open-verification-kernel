name: OVK Pilot (Fork Adopter)

# Copy to .github/workflows/ovk-pilot.yml in your repository.
# See docs/EXTERNAL_PILOT_PLAYBOOK.md for advisory → strict rollout.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  OVK_PACKAGE_VERSION: "1.1.0"

jobs:
  ovk-ci-secrets-pilot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OVK advisory check (ci_secrets lane)
        uses: fraware/open-verification-kernel@v1.1.0
        with:
          mode: advisory
          use-check: "true"
          verification-manifest: .verification/ci_secrets_pilot.json
          post-comment: "true"
