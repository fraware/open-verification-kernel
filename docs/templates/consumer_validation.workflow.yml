name: OVK Consumer Validation

# Template only. Copy into a consumer repository and keep the immutable pin.
# Live examples:
#   https://github.com/fraware/ovk-consumer-fastapi-terraform
#   https://github.com/fraware/ovk-consumer-express-actions
#
# Sprint 9 target pin: immutable v1.3.0-rc.1 (or audited full SHA) AFTER the
# attributable rc.1 tag exists. Until then, keep the signed v1.2.1 pin.
# Do not push consumer changes from this template alone.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  # After rc.1 cut: "1.3.0rc1". Until then keep "1.2.1".
  OVK_PACKAGE_VERSION: "1.3.0rc1"
  OVK_ACTION_REF: "v1.3.0-rc.1"

jobs:
  ovk-consumer-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Guard pin target
        run: |
          echo "Expected Action ref: ${OVK_ACTION_REF}"
          echo "Expected package: ${OVK_PACKAGE_VERSION}"
          echo "Refuse floating @main pins. Prefer tag or full commit SHA."
      - name: Run OVK advisory consumer path
        # Replace with the immutable tag/SHA once v1.3.0-rc.1 exists.
        uses: fraware/open-verification-kernel@v1.3.0-rc.1
        with:
          mode: advisory
          use-check: "true"
          emit-check: "true"
          post-comment: "true"
      - name: Record pilot ledger reminder
        run: |
          echo "Adjudicate this PR into a pilot ledger conforming to schemas/pilot.ledger.schema.json"
          echo "Do not set production_gate_met=true until 30 human adjudications exist."
          echo "Keep automated_scenario rows distinct from human adjudications."
