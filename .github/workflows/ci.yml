name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check ovk tests benchmarks/formal_pr_bench/score_seed_cases.py
      - name: Test
        run: pytest
      - name: Score seed benchmark cases
        run: python benchmarks/formal_pr_bench/score_seed_cases.py
