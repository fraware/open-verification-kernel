name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and verify release gates
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pytest -q
          ovk release-preflight
          ovk pilot
          ovk bench --expanded --no-extended --leaderboard .verification/formal-pr-bench-leaderboard.json
      - name: Build and inspect package
        run: |
          pip install build twine
          python scripts/sync_package_data.py
          python -m build
          twine check dist/*

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python scripts/sync_package_data.py
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
